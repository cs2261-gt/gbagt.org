  <script src="/modules/GUIGlueCode.js"></script>
  <script type="module">
    import mGBA from '/mgba-wasm/dist/mgba.js';

    async function getFileFromUrl(url, name, defaultType = 'application/octet-stream') {
      const response = await fetch(url);
      const data = await response.blob();
      return new File([data], name, {
        type: data.type || defaultType,
      });
    }

    let module = {
      canvas: (function () {
        return document.getElementById('emulator_target');
      })()
    };

    window.onload = () => {
      mGBA(module).then(function (mGBA) {
        let mGBAVersion = mGBA.version.projectName + ' ' + mGBA.version.projectVersion;
        console.log(mGBAVersion);
        mGBA.setCoreSettings({ autoSaveStateEnable: false, restoreAutoSaveStateOnLoad: false });
        mGBA.FSInit();
        window.mGBA = mGBA;

        function letErRip() {
          document.querySelector("#container").removeAttribute("class");
          document.querySelectorAll("img.preview, .instructions").forEach((el => el.remove()));
          mGBA.loadGame(mGBA.filePaths().gamePath + '/' + window.game["rom"] + '.gba')
        }

        fetch('/manifest.json')
          .then(response => response.json()
            .then(json => {
              window.MANIFEST = json;
              let fallback = { projectName: "lab0", rom: "lab0" };
              window.game = MANIFEST.find(m => m.projectName == new URLSearchParams(location.search).get("project")) || fallback;

              let img = document.querySelector("img.preview");
              img.setAttribute("src", "/roms/" + window.game["rom"] + ".png");
              getFileFromUrl(
                '/roms/' + window.game["rom"] + '.gba',
                window.game["rom"] + '.gba'
              ).then(file => {
                mGBA.uploadRom(file, () => { addEvent("click", document.querySelector("img.preview"), letErRip); });
                addEvent("click", document.getElementById("restart"), () => {
                  mGBA.quickReload();
                  mGBA.resumeGame();
                  document.getElementById("play").classList.add("hide");
                  document.getElementById("pause").classList.remove("hide");
                });
                addEvent("click", document.getElementById("play"), () => {
                  mGBA.resumeGame();
                  document.getElementById("play").classList.add("hide");
                  document.getElementById("pause").classList.remove("hide");
                });
                addEvent("click", document.getElementById("pause"), () => {
                  mGBA.pauseGame();
                  document.getElementById("pause").classList.add("hide");
                  document.getElementById("play").classList.remove("hide");
                });
                addEvent("click", document.getElementById("fullscreen"), () => {
                  if (document.fullscreenElement){
                    document.exitFullscreen();
                  } else {
                    document.getElementById("container").requestFullscreen();
                  }
                });
                addEvent("change", document.getElementById("sound"), (e) => {
                  e.preventDefault();
                  if (e.target.checked) {
                    mGBA.resumeAudio();
                  } else {
                    mGBA.pauseAudio();
                  }
                });
              });
            }));
      });
    }
  </script>
